{% block content %}

<style>
.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    max-width: 900px;
    margin: 40px auto;
}

.gallery img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}
</style>

<h2 class="text-center mb-4" style="font-family: 'Righteous'; color: #b22222;">🍔 OUR BURGER EXPERIMENTS</h2>

<div class="gallery">
    <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=1000&auto=format&fit=crop" alt="Burger 1">

    <img src="https://images.unsplash.com/photo-1571091718767-18b5b1457add?q=80&w=1000&auto=format&fit=crop" alt="Burger 3">
