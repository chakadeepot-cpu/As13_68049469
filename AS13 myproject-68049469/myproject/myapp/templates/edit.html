{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="text-center mb-4" style="font-family: 'Righteous'; color: #b22222;">🍔 EDIT SUBJECT DATA</h2>
            <div class="card shadow p-4 border-0" style="border-left: 5px solid #ffcc00;">
                <form method="POST" action="/update/{{ person.id }}/">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">ชื่อประชากร</label>
                        <input type="text" name="name" class="form-control" value="{{ person.name }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">อายุ</label>
                        <input type="number" name="age" class="form-control" value="{{ person.age }}">
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success w-100">บันทึกการแก้ไข</button>
                        <a href="/" class="btn btn-outline-secondary w-100">ยกเลิก</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
